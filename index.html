<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SGX - LAI PR PoC + Info</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; font-family: monospace; user-select: none; }
        #ui { position: absolute; top: 20px; left: 20px; color: #FDCC0D; z-index: 10; background: rgba(50, 82, 123, 0.9); padding: 15px; border: 2px solid #FDCC0D; border-radius: 8px; width: 250px;}
        h2 { margin: 0 0 10px 0; font-size: 16px; text-transform: uppercase; letter-spacing: 2px; }
        button { background: #FDCC0D; color: #111; border: none; padding: 10px; margin: 5px 0; cursor: pointer; font-weight: bold; width: 100%; text-transform: uppercase; transition: 0.2s; }
        button:hover { background: #fff; transform: scale(1.02); }
        
        /* Botón de Info Dinámico */
        #btn-info { background: #00ffcc; color: #111; display: none; margin-top: 15px; }

        /* Panel de Información (Modal) */
        #info-panel { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 320px; background: #32527B; color: #fff; border: 3px solid #FDCC0D;
            padding: 20px; display: none; z-index: 100; box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }
        #info-panel h3 { color: #FDCC0D; margin-top: 0; text-transform: uppercase; }
        #info-panel p { line-height: 1.4; font-size: 14px; }
        #close-info { background: #ff4444; color: white; margin-top: 10px; }

        #hud { position: absolute; bottom: 30px; width: 100%; text-align: center; color: #fff; pointer-events: none; font-size: 18px; text-shadow: 2px 2px 0px #000; }
        #score { font-size: 20px; font-weight: bold; color: #00ffcc; margin-top: 10px; border-top: 1px solid #FDCC0D; padding-top: 10px; }
    </style>
</head>
<body>

    <div id="ui">
        <h2>LAI PR - SISTEMA</h2>
        <button onclick="setMode('RUN')">1. 100m Dash</button>
        <button onclick="setMode('BASKET')">2. Baloncesto</button>
        <button onclick="setMode('SOCCER')">3. Fútbol</button>
        <div id="score">PUNTOS: 0</div>
        <button id="btn-info" onclick="toggleInfo(true)">[ ! ] INFO VENUE</button>
    </div>

    <div id="info-panel">
        <h3 id="info-title">Título</h3>
        <p id="info-text">Contenido de la información...</p>
        <button id="close-info" onclick="toggleInfo(false)">CERRAR</button>
    </div>

    <div id="hud">Selecciona una disciplina</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // DATA DE VENUES (Tu capa estratégica)
        const venueData = {
            'RUN': {
                title: "Estadio Centroamericano",
                text: "Ubicado en Mayagüez. La pista sintética es de grado olímpico. Aquí se rompió el récord de las Justas en 2010. Clave: Mantén el ritmo de la batucada."
            },
            'BASKET': {
                title: "Auditorio Juan 'Pachín' Vicéns",
                text: "La casa de los Leones en Ponce. Un venue legendario para las finales de la LAI. La presión del público afecta el pulso del tirador."
            },
            'SOCCER': {
                title: "Campo de Fútbol - Colegio",
                text: "El RUM (Mayagüez) suele ser host de las eliminatorias. El viento que baja de las montañas de la Sultana del Oeste afecta la trayectoria del balón."
            }
        };

        // SETUP BÁSICO
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const ball = new THREE.Mesh(new THREE.SphereGeometry(0.4), new THREE.MeshStandardMaterial({ color: 0xffffff }));
        scene.add(ball);
        const light = new THREE.PointLight(0xffffff, 1, 100);
        light.position.set(10, 10, 10);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        let mode = 'NONE';
        let score = 0;

        function setMode(newMode) {
            mode = newMode;
            ball.position.set(0, 0.4, -2);
            document.getElementById('hud').innerText = `MODO: ${mode}`;
            
            // Mostrar botón de info
            document.getElementById('btn-info').style.display = 'block';
            
            // Update modal content ahead of time
            document.getElementById('info-title').innerText = venueData[mode].title;
            document.getElementById('info-text').innerText = venueData[mode].text;

            // Reset camera for mode
            if(mode === 'RUN') camera.position.set(0, 2, 5);
            else camera.position.set(0, 1.5, 2);
            camera.lookAt(0,0,0);
        }

        function toggleInfo(show) {
            document.getElementById('info-panel').style.display = show ? 'block' : 'none';
        }

        function animate() {
            requestAnimationFrame(animate);
            if(mode !== 'NONE') ball.rotation.y += 0.01;
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
