<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SGX - LAI Core (Bolines Engine)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        * { box-sizing: border-box; }
        body { margin: 0; overflow: hidden; background-color: #050508; font-family: 'Share Tech Mono', monospace; color: #FDCC0D; user-select: none; }
        
        #ui { position: absolute; top: 15px; left: 15px; z-index: 10; display: flex; gap: 10px; }
        
        button { 
            background: rgba(50, 82, 123, 0.6); color: #FDCC0D; border: none; 
            border-left: 3px solid #FDCC0D; border-right: 3px solid #FDCC0D;
            padding: 10px 20px; font-family: 'Share Tech Mono', monospace; font-size: 14px; 
            cursor: pointer; text-transform: uppercase; font-weight: bold;
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
            backdrop-filter: blur(4px); transition: 0.2s;
        }
        button:hover, button.active { background: rgba(0, 255, 255, 0.2); color: #fff; border-color: #00FFFF; }

        #hud { position: absolute; bottom: 20px; width: 100%; text-align: center; color: #00FFFF; font-size: 18px; text-shadow: 0 0 10px #00FFFF; pointer-events: none; }
        
        .glitch-title { position: absolute; top: 15px; right: 15px; font-size: 24px; color: #fff; text-shadow: 2px 0 #00FFFF, -2px 0 #FF0055; z-index: 10;}
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div class="glitch-title">LAI_ENGINE.exe</div>
    
    <div id="ui">
        <button id="btn-run" onclick="setMode('RUN')">1. VALLAS (RUN)</button>
        <button id="btn-basket" onclick="setMode('BASKET')">2. BASKET</button>
        <button id="btn-soccer" onclick="setMode('SOCCER')">3. SOCCER</button>
    </div>

    <div id="hud">SELECCIONA DISCIPLINA</div>

<script>
    // 1. SETUP DEL MOTOR SGX
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x050508, 0.005);
    
    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x050508);
    document.body.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.maxPolarAngle = Math.PI / 2 - 0.05; // No ver debajo del piso

    // Luces
    scene.add(new THREE.AmbientLight(0xffffff, 0.4));
    const spotLight = new THREE.SpotLight(0xFDCC0D, 1);
    spotLight.position.set(20, 50, 20);
    scene.add(spotLight);

    // Piso Tron-Style
    const grid = new THREE.GridHelper(200, 50, 0x32527B, 0x111111);
    scene.add(grid);

    // 2. OBJETOS (Primitives)
    const ball = new THREE.Mesh(new THREE.SphereGeometry(1.5, 32, 32), new THREE.MeshStandardMaterial({ color: 0xff5500 }));
    scene.add(ball);

    const hoop = new THREE.Mesh(new THREE.TorusGeometry(2, 0.2, 16, 32), new THREE.MeshStandardMaterial({ color: 0x00FFFF }));
    hoop.rotation.x = Math.PI / 2;
    hoop.position.set(0, 15, -30);
    scene.add(hoop);

    const hurdle = new THREE.Mesh(new THREE.BoxGeometry(10, 3, 0.5), new THREE.MeshStandardMaterial({ color: 0xFF0055 }));
    hurdle.position.set(0, 1.5, -40);
    scene.add(hurdle);

    // 3. SISTEMA FÍSICO Y DE ESTADO
    let mode = 'NONE';
    let isMoving = false;
    let velocity = new THREE.Vector3();
    const gravity = -40; // Gravedad ajustada para el "peso" en 3D
    let score = 0;

    // 4. EL MOTOR DE SLINGSHOT (Raycaster + Drag)
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    const planeXZ = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
    let dragStart = new THREE.Vector3();
    let isDragging = false;

    // Línea visual para el SlingShot (Vector de tensión)
    const lineMat = new THREE.LineBasicMaterial({ color: 0x00FFFF, linewidth: 2 });
    const line = new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]), lineMat);
    scene.add(line);
    line.visible = false;

    function setMode(newMode) {
        mode = newMode;
        isMoving = false;
        velocity.set(0,0,0);
        
        document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + mode.toLowerCase()).classList.add('active');

        ball.position.set(0, 1.5, 0);
        
        if(mode === 'BASKET') {
            camera.position.set(0, 10, 25);
            controls.target.set(0, 5, -15);
            hoop.visible = true; hurdle.visible = false;
            ball.material.color.setHex(0xff5500);
            document.getElementById('hud').innerText = "DRAG: Rota cámara. CLICK EN BOLA + DRAG: Tira al aro.";
        } 
        else if(mode === 'SOCCER') {
            camera.position.set(0, 5, 20);
            controls.target.set(0, 0, -20);
            hoop.visible = false; hurdle.visible = false;
            ball.material.color.setHex(0xffffff);
            document.getElementById('hud').innerText = "Tiro libre. Calcula la fuerza y el ángulo del piso.";
        }
        else if(mode === 'RUN') {
            camera.position.set(0, 8, 15);
            controls.target.set(0, 2, -10);
            hoop.visible = false; hurdle.visible = true;
            ball.material.color.setHex(0x32527B); // Avatar
            document.getElementById('hud').innerText = "SWIPE UP en la pantalla para saltar la valla";
            isMoving = true;
            velocity.set(0, 0, -15); // Auto-run constante hacia Z negativo
        }
    }

    // INTERACCIÓN
    renderer.domElement.addEventListener('pointerdown', (e) => {
        if(mode === 'NONE') return;

        mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);

        // Si tocamos la bola (Slingshot para Basket/Soccer)
        if(mode !== 'RUN') {
            let hitbox = new THREE.Sphere(ball.position, 3);
            if (raycaster.ray.intersectsSphere(hitbox) && !isMoving) {
                isDragging = true;
                controls.enabled = false; // Bloquear rotación de cámara mientras tiras
                raycaster.ray.intersectPlane(planeXZ, dragStart);
                line.visible = true;
            }
        } else {
            // Para "Run", cualquier touch registra el inicio del swipe
            if(ball.position.y <= 1.5) { // Solo si está tocando el piso
                isDragging = true;
                dragStart.set(e.clientX, e.clientY, 0); // Pantalla 2D para el swipe
            }
        }
    });

    renderer.domElement.addEventListener('pointermove', (e) => {
        if (isDragging && mode !== 'RUN') {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            
            let currentPoint = new THREE.Vector3();
            raycaster.ray.intersectPlane(planeXZ, currentPoint);
            
            // Dibujar la liga del slingshot invertida
            let forceVec = new THREE.Vector3().subVectors(dragStart, currentPoint);
            let endLine = new THREE.Vector3().addVectors(ball.position, forceVec);
            line.geometry.setFromPoints([ball.position, endLine]);
        }
    });

    renderer.domElement.addEventListener('pointerup', (e) => {
        if (!isDragging) return;
        isDragging = false;
        controls.enabled = true;
        line.visible = false;

        if (mode !== 'RUN') {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            
            let dropPoint = new THREE.Vector3();
            raycaster.ray.intersectPlane(planeXZ, dropPoint);
            
            // Vector de fuerza (Invertido como un slingshot)
            let force = new THREE.Vector3().subVectors(dragStart, dropPoint);
            
            // TRUCO DE ARQUITECTO: Convertir longitud plana en altura (Y) balística
            let power = force.length(); 
            if(power > 0.5) { // Threshold
                isMoving = true;
                velocity.x = force.x * 1.5;
                velocity.z = force.z * 1.5;
                // El Basket necesita más arco (Y), Soccer es más directo
                velocity.y = mode === 'BASKET' ? power * 1.2 : power * 0.5; 
            }
        } else {
            // Lógica de Vallas (Swipe Up)
            let swipeY = dragStart.y - e.clientY;
            if (swipeY > 50 && ball.position.y <= 1.5) { // Swipe hacia arriba válido
                velocity.y = 20; // Fuerza de salto
            }
        }
    });

    // 5. LOOP FÍSICO
    const clock = new THREE.Clock();

    function animate() {
        requestAnimationFrame(animate);
        let dt = clock.getDelta();
        controls.update();

        if (isMoving) {
            // Aplicar gravedad
            velocity.y += gravity * dt;
            ball.position.addScaledVector(velocity, dt);

            // Rebote en el piso
            if (ball.position.y < 1.5) {
                ball.position.y = 1.5;
                if(mode !== 'RUN') {
                    velocity.y *= -0.6; // Bouncing loss
                    velocity.x *= 0.8;  // Friction
                    velocity.z *= 0.8;
                    
                    if (Math.abs(velocity.y) < 1 && Math.abs(velocity.z) < 1) {
                        isMoving = false; // Se detuvo, resetear posición
                        setTimeout(() => setMode(mode), 1000);
                    }
                } else {
                    velocity.y = 0; // En modo correr, se pega al piso y sigue
                }
            }

            // Modo Run: La cámara sigue al jugador
            if(mode === 'RUN') {
                camera.position.z = ball.position.z + 15;
                controls.target.set(ball.position.x, 2, ball.position.z - 10);
                
                // Generar vallas infinitas
                if(ball.position.z < hurdle.position.z) {
                    hurdle.position.z -= 40;
                }
            }
        }

        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
