<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SGX Justas Challenge</title>
    <style>
        :root {
            --primary: #008f39; /* Verde Mayagüez */
            --dark: #121212;
            --card: #1e1e1e;
            --text: #f4f4f4;
            --accent: #FDCC0D; /* SGX Yellow */
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; touch-action: none; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        
        /* CONTENEDOR EMULADOR (Consistencia con el Hub) */
        body { background-color: #050505; color: var(--text); overflow: hidden; display: flex; justify-content: center; }
        
        #app-container {
            width: 100%;
            max-width: 480px; 
            background-color: var(--dark);
            height: 100vh;
            position: relative;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            overflow: hidden;
        }

        /* OVERLAY DE SELECCIÓN DE UNIVERSIDAD */
        #uni-selector {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(18, 18, 18, 0.95); z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            backdrop-filter: blur(15px); padding: 20px;
        }
        #uni-selector h1 { font-size: 32px; text-transform: uppercase; color: var(--accent); margin-bottom: 10px; text-align: center; font-weight: 900; letter-spacing: 2px;}
        #uni-selector p { color: #aaa; margin-bottom: 40px; font-size: 14px; text-align: center; line-height: 1.5; }
        
        .uni-btn {
            width: 100%; max-width: 320px; padding: 18px; margin-bottom: 15px;
            background: var(--card); border: 2px solid; border-radius: 12px;
            font-size: 16px; font-weight: 800; color: white; cursor: pointer;
            text-transform: uppercase; letter-spacing: 1px; transition: 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .uni-uprm { border-color: #008f39; } .uni-uprm:active { background: #008f39; transform: scale(0.98); }
        .uni-inter { border-color: #FDCC0D; color: #FDCC0D;} .uni-inter:active { background: #FDCC0D; color: black; transform: scale(0.98);}
        .uni-iupi { border-color: #cc0000; } .uni-iupi:active { background: #cc0000; transform: scale(0.98);}
        .uni-sagrado { border-color: #ff007f; } .uni-sagrado:active { background: #ff007f; transform: scale(0.98);}

        /* UI DEL JUEGO */
        #game-ui { display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; pointer-events: none; }
        
        #nav-modes { 
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%); 
            z-index: 10; display: flex; gap: 8px; background: rgba(0,0,0,0.7); 
            padding: 8px; border-radius: 30px; border: 1px solid #333; pointer-events: auto;
            backdrop-filter: blur(5px);
        }
        
        .mode-btn { 
            background: transparent; color: #888; border: none; 
            border-radius: 20px; padding: 10px 18px; font-size: 13px; 
            cursor: pointer; font-weight: 800; text-transform: uppercase; transition: 0.3s;
        }
        .mode-btn.active { background: var(--accent); color: #000; box-shadow: 0 0 15px rgba(253, 204, 13, 0.4); }

        #score-board { position: absolute; top: 90px; width: 100%; text-align: center; }
        #score-val { font-size: 50px; font-weight: 900; color: white; text-shadow: 0 4px 15px rgba(0,0,0,0.8); line-height: 1; }
        #streak-val { font-size: 18px; color: var(--accent); font-weight: 900; text-transform: uppercase; letter-spacing: 3px; margin-top: 5px; text-shadow: 0 2px 5px rgba(0,0,0,0.8); }

        #hype-text { 
            position: absolute; top: 40%; width: 100%; text-align: center; 
            font-size: 50px; font-weight: 900; color: #fff; text-transform: uppercase;
            opacity: 0; transform: scale(0.5); transition: 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-shadow: 0px 5px 0px #000, 0 0 30px var(--primary); z-index: 50;
        }

        #hud { position: absolute; bottom: 50px; width: 100%; text-align: center; font-size: 15px; font-weight: 800; letter-spacing: 1px; color: #aaa; text-transform: uppercase; background: linear-gradient(to right, transparent, rgba(0,0,0,0.5), transparent); padding: 10px 0; }
        
        #brand-tag { position: absolute; bottom: 15px; width: 100%; text-align: center; font-size: 11px; color: #555; font-weight: bold; letter-spacing: 1px; }

        /* Contenedor del Canvas para mantener proporciones en Desktop */
        #canvas-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: -1; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

<div id="app-container">
    <div id="uni-selector">
        <h1>Elige tu Sangre</h1>
        <p>¿A quién representas en el ecosistema de las Justas 2026?</p>
        <button class="uni-btn uni-uprm" onclick="startGame('Colegio')">Colegio (UPRM)</button>
        <button class="uni-btn uni-inter" onclick="startGame('Tigres')">Interamericana</button>
        <button class="uni-btn uni-iupi" onclick="startGame('Gallitos')">La Iupi (UPRRP)</button>
        <button class="uni-btn uni-sagrado" onclick="startGame('Delfines')">Sagrado</button>
    </div>

    <div id="game-ui">
        <div id="nav-modes">
            <button id="btn-run" class="mode-btn" onclick="setMode('RUN')">Vallas</button>
            <button id="btn-basket" class="mode-btn" onclick="setMode('BASKET')">Basket</button>
            <button id="btn-soccer" class="mode-btn" onclick="setMode('SOCCER')">Fútbol</button>
        </div>
        
        <div id="score-board">
            <div id="score-val">0</div>
            <div id="streak-val">Racha x1</div>
        </div>

        <div id="hype-text">¡SWISH!</div>
        <div id="hud">Haz swipe para interactuar</div>
        <div id="brand-tag">POWERED BY SPATIALGINEERS</div>
    </div>
    
    <div id="canvas-container"></div>
</div>

<script>
    let playerTeam = "";
    let teamColor = 0x008f39; // Verde SGX Default

    function startGame(team) {
        playerTeam = team;
        document.getElementById('uni-selector').style.display = 'none';
        document.getElementById('game-ui').style.display = 'block';
        
        // Mapeo tribal de colores
        if(team === 'Colegio') teamColor = 0x008f39;
        if(team === 'Tigres') teamColor = 0xFDCC0D;
        if(team === 'Gallitos') teamColor = 0xcc0000;
        if(team === 'Delfines') teamColor = 0xff007f;
        
        // Inyectar el color de la tribu en el motor gráfico y la UI
        grid.material.color.setHex(teamColor);
        ballLight.color.setHex(teamColor);
        document.getElementById('streak-val').style.color = '#' + teamColor.toString(16).padStart(6, '0');
        
        setMode('BASKET'); 
    }

    // 1. ARQUITECTURA ESTÉTICA (Cyber / Night Mode Integrado)
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a0a);
    scene.fog = new THREE.FogExp2(0x0a0a0a, 0.025); 
    
    // Cámara ajustada al contenedor emulador, no a la ventana global
    const camera = new THREE.PerspectiveCamera(55, container.clientWidth / container.clientHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    container.appendChild(renderer.domElement);

    // Ajuste responsivo para cuando el usuario rota el celular
    window.addEventListener('resize', () => {
        camera.aspect = container.clientWidth / container.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight);
    });

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
    scene.add(ambientLight);

    const mainLight = new THREE.DirectionalLight(0xffffff, 1.2);
    mainLight.position.set(0, 20, 10);
    scene.add(mainLight);

    const grid = new THREE.GridHelper(200, 100, 0x008f39, 0x111111);
    grid.position.y = 0;
    scene.add(grid);

    // 2. ACTIVOS Y HITBOXES SÓLIDOS
    const ballRadius = 0.8;
    const ballMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.2, metalness: 0.8 });
    const ball = new THREE.Mesh(new THREE.SphereGeometry(ballRadius, 32, 32), ballMat);
    scene.add(ball);

    const ballWire = new THREE.Mesh(new THREE.SphereGeometry(ballRadius + 0.05, 16, 16), new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true, transparent: true, opacity: 0.4 }));
    ball.add(ballWire);

    const ballLight = new THREE.PointLight(0x008f39, 2, 15);
    ball.add(ballLight);

    // Canasto (Basket)
    const hoop = new THREE.Group();
    const ring = new THREE.Mesh(new THREE.TorusGeometry(1.2, 0.1, 16, 32), new THREE.MeshBasicMaterial({ color: 0xff4400 })); 
    ring.rotation.x = Math.PI / 2;
    hoop.add(ring);
    
    const board = new THREE.Mesh(new THREE.BoxGeometry(4, 3, 0.2), new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.5, metalness: 0.8, transparent: true, opacity: 0.9 }));
    board.position.set(0, 1.5, -1.3);
    
    const boardEdge = new THREE.EdgesGeometry(new THREE.BoxGeometry(4, 3, 0.2));
    const boardLine = new THREE.LineSegments(boardEdge, new THREE.LineBasicMaterial({ color: 0xffffff, linewidth: 2 }));
    boardLine.position.set(0, 1.5, -1.3);
    hoop.add(board, boardLine);
    scene.add(hoop);
    const boardBox = new THREE.Box3();

    // Portería (Soccer)
    const goal = new THREE.Group();
    const postMat = new THREE.MeshBasicMaterial({ color: 0xffffff }); 
    const postGeo = new THREE.CylinderGeometry(0.15, 0.15, 4);
    const leftPost = new THREE.Mesh(postGeo, postMat); leftPost.position.set(-4, 2, 0);
    const rightPost = new THREE.Mesh(postGeo, postMat); rightPost.position.set(4, 2, 0);
    const topBar = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.15, 8.3), postMat); topBar.rotation.z = Math.PI / 2; topBar.position.set(0, 4, 0);
    
    const netArea = new THREE.Mesh(new THREE.BoxGeometry(8, 4, 2), new THREE.MeshBasicMaterial({ visible: false }));
    netArea.position.set(0, 2, -1);
    goal.add(leftPost, rightPost, topBar, netArea);
    scene.add(goal);
    const goalBox = new THREE.Box3();

    // Valla (Run) - Hitbox Matemático Refactorizado
    const hurdle = new THREE.Group();
    const hBar = new THREE.Mesh(new THREE.BoxGeometry(6, 0.3, 0.3), new THREE.MeshBasicMaterial({ color: 0xff0055 }));
    hBar.position.y = 1.5;
    const hLegL = new THREE.Mesh(new THREE.BoxGeometry(0.3, 1.5, 0.3), new THREE.MeshStandardMaterial({color: 0x333333}));
    hLegL.position.set(-2.85, 0.75, 0);
    const hLegR = hLegL.clone(); hLegR.position.set(2.85, 0.75, 0);
    
    // Caja de colisión invisible anclada a la valla para evitar "tunneling"
    const hurdleCollisionVolume = new THREE.Mesh(new THREE.BoxGeometry(6.5, 2.0, 1.0), new THREE.MeshBasicMaterial({visible: false}));
    hurdleCollisionVolume.position.y = 1.0;
    
    hurdle.add(hBar, hLegL, hLegR, hurdleCollisionVolume);
    scene.add(hurdle);
    const hurdleBox = new THREE.Box3(); // Instancia de hitbox puro

    // 3. MOTOR DE FÍSICAS Y SISTEMA HYPE
    let mode = 'NONE';
    let isMoving = false;
    let velocity = new THREE.Vector3();
    let spin = 0;
    const gravity = -35; 
    let score = 0;
    let streak = 1;
    let runSpeedMultiplier = 1;
    let clock = new THREE.Clock();

    const startPos = new THREE.Vector3(0, ballRadius, 0);

    const hypeEl = document.getElementById('hype-text');
    function showHype(type) {
        let msg = "";
        if(type === 'score_basket') msg = ["¡SWISH!", "¡LÍQUIDO!", "¡FUEGO!", "¡" + playerTeam.toUpperCase() + "!" ][Math.floor(Math.random()*4)];
        if(type === 'score_soccer') msg = ["¡GOLAZO!", "¡AL ÁNGULO!", "¡CLAVADO!"][Math.floor(Math.random()*3)];
        if(type === 'miss') { msg = ["BRICK", "AIRE", "MALA MÍA", "FALTÓ CALLE"][Math.floor(Math.random()*4)]; hypeEl.style.color = "#ff0000"; } 
        else { hypeEl.style.color = "#fff"; }
        
        hypeEl.innerText = msg;
        hypeEl.style.opacity = 1;
        hypeEl.style.transform = "scale(1)";
        
        setTimeout(() => {
            hypeEl.style.opacity = 0;
            hypeEl.style.transform = "scale(0.5)";
        }, 1000);
    }

    function updateScore(points, isMiss = false) {
        if(isMiss) {
            streak = 1;
            if(mode !== 'RUN') showHype('miss'); // En vallas no queremos tapar la pantalla cada vez que chocas
        } else {
            score += (points * streak);
            streak++;
            if(mode === 'BASKET') showHype('score_basket');
            if(mode === 'SOCCER') showHype('score_soccer');
        }
        
        document.getElementById('score-val').innerText = score;
        document.getElementById('streak-val').innerText = streak > 1 ? `Racha x${streak}` : "";
        
        document.getElementById('score-val').style.transform = "scale(1.2)";
        setTimeout(() => document.getElementById('score-val').style.transform = "scale(1)", 150);
    }

    function setMode(newMode) {
        mode = newMode;
        isMoving = false;
        velocity.set(0,0,0);
        spin = 0;
        streak = 1;
        score = 0;
        runSpeedMultiplier = 1;
        updateScore(0, false);
        ball.position.copy(startPos);
        ball.rotation.set(0,0,0);

        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + mode.toLowerCase()).classList.add('active');

        hoop.visible = false; goal.visible = false; hurdle.visible = false;
        ballWire.material.color.setHex(teamColor);

        if(mode === 'BASKET') {
            camera.position.set(0, 4, 12); camera.lookAt(0, 6, -15);
            hoop.visible = true; hoop.position.set(0, 7, -20);
            hoop.updateMatrixWorld(true); boardBox.setFromObject(board);
            ballMat.color.setHex(0xd55e00);
            document.getElementById('hud').innerText = "Swipe central. El tablero se mueve.";
        } 
        else if(mode === 'SOCCER') {
            camera.position.set(0, 3, 12); camera.lookAt(0, 1, -20);
            goal.visible = true; 
            // Posición inicial del Soccer, se irá randomizando
            goal.position.set(0, 0, -25); 
            goal.updateMatrixWorld(true); goalBox.setFromObject(goal);
            ballMat.color.setHex(0xffffff); ballWire.material.color.setHex(0x000000);
            document.getElementById('hud').innerText = "Swipe curva. Cuidado con la distancia.";
        }
        else if(mode === 'RUN') {
            camera.position.set(0, 4, 8); camera.lookAt(0, 1, -10);
            hurdle.visible = true; hurdle.position.set(0, 0, -30);
            ballMat.color.setHex(teamColor); ballWire.material.color.setHex(0xffffff);
            document.getElementById('hud').innerText = "Swipe arriba para saltar las vallas";
            isMoving = true; 
        }
    }

    // RESET PARA DIFICULTAD DINÁMICA (DDA)
    function resetPlay() {
        isMoving = false;
        ball.position.copy(startPos);
        ball.rotation.set(0,0,0);
        velocity.set(0,0,0);
        spin = 0;
        hasScoredThisShot = false;

        // Dificultad Dinámica: Soccer Spawn Aleatorio + Profundidad
        if(mode === 'SOCCER') {
            // El goalpost retrocede un máximo de -45 en Z, y varía entre -8 y 8 en X
            let depthMultiplier = Math.min(streak * 2, 20); 
            let lateralShift = (Math.random() - 0.5) * 16; // Randomizer agresivo lateral
            
            goal.position.set(lateralShift, 0, -25 - depthMultiplier);
            goal.updateMatrixWorld(true); 
            goalBox.setFromObject(goal);
        }
    }

    // 4. MOTOR DE SWIPE CON DETECCIÓN TÁCTIL ABSOLUTA
    let touchStart = { y: 0, x: 0, time: 0 };
    const hitArea = document.getElementById('app-container');

    hitArea.addEventListener('pointerdown', (e) => {
        if(e.target.tagName === 'BUTTON') return;
        touchStart.y = e.clientY; touchStart.x = e.clientX; touchStart.time = Date.now();
    });

    hitArea.addEventListener('pointerup', (e) => {
        if(mode === 'NONE' || (isMoving && mode !== 'RUN')) return;

        let deltaY = touchStart.y - e.clientY; 
        let deltaX = e.clientX - touchStart.x; 
        let timeLapse = (Date.now() - touchStart.time) / 1000; 

        if (deltaY > 20 && timeLapse < 0.8) { 
            let swipeSpeed = deltaY / timeLapse; 
            if(swipeSpeed > 3200) swipeSpeed = 3200; // Cap físico protegido

            if (mode === 'RUN') {
                if(ball.position.y <= ballRadius + 0.1) velocity.y = 17; // Impulso de salto
            } else {
                isMoving = true;
                let zForce = swipeSpeed * 0.016; 
                let yForce = swipeSpeed * 0.013; 
                let xForce = deltaX * 0.05; 
                spin = deltaX * 0.05; 

                if (mode === 'BASKET') velocity.set(xForce, yForce * 1.5, -zForce); 
                else if (mode === 'SOCCER') velocity.set(xForce, yForce * 0.8, -zForce * 1.3); 
            }
        }
    });

    // 5. RENDER LOOP Y FÍSICAS DE ALTA PRECISIÓN
    const ballSphere = new THREE.Sphere();
    let hasScoredThisShot = false;

    function animate() {
        requestAnimationFrame(animate);
        let dt = clock.getDelta();
        if(dt > 0.1) dt = 0.1; 
        let time = clock.getElapsedTime();

        // DIFICULTAD DINÁMICA: Basket Oscilación Sinusoidal
        if(mode === 'BASKET') {
            // Velocidad y amplitud atadas a la racha
            let speed = 1.5 + (streak * 0.2);
            let amplitude = Math.min(2 + (streak * 0.8), 8); // Máximo movimiento lateral de 8 unidades
            
            hoop.position.x = Math.sin(time * speed) * amplitude;
            hoop.updateMatrixWorld(true);
            boardBox.setFromObject(board); // Actualizar hitbox de madera en tiempo real
        }

        if (isMoving) {
            if(mode !== 'RUN') {
                velocity.z *= 0.99; velocity.x *= 0.99;
                if(mode === 'SOCCER' && ball.position.y > ballRadius) velocity.x -= spin * dt * 3.0; // Magnus Curve Amplificado
            }

            velocity.y += gravity * dt;
            ball.position.addScaledVector(velocity, dt);
            
            ball.rotation.x += velocity.z * dt * 0.5;
            ball.rotation.z -= velocity.x * dt * 0.5;
            ball.rotation.y += spin * dt;

            ballSphere.set(ball.position, ballRadius);

            // A) BASKETBALL CORE
            if (mode === 'BASKET') {
                if (boardBox.intersectsSphere(ballSphere)) {
                    let intersectionDepth = ballSphere.radius - Math.abs(boardBox.max.z - ballSphere.center.z);
                    if(intersectionDepth > 0 && velocity.z < 0) ball.position.z += intersectionDepth + 0.05;
                    velocity.z *= -0.4; velocity.y *= 0.8; velocity.x *= 0.8;
                }
                
                // Validación matemática de "Swish" dinámica (persiguiendo el aro móvil)
                if(!hasScoredThisShot && velocity.y < 0 && ball.position.y < 7 && ball.position.y > 6) {
                    if (Math.abs(ball.position.x - hoop.position.x) < 1.2 && Math.abs(ball.position.z - hoop.position.z) < 1.2) {
                        hasScoredThisShot = true;
                        updateScore(2, false);
                    }
                }
            }

            // B) SOCCER CORE
            if (mode === 'SOCCER') {
                if (goalBox.intersectsSphere(ballSphere)) {
                    if (velocity.z < 0 && ball.position.z < goalBox.max.z) {
                        ball.position.z = goalBox.max.z + ballRadius; 
                        velocity.z *= -0.2; velocity.x *= 0.5; velocity.y *= 0.5;
                        if(!hasScoredThisShot) {
                            hasScoredThisShot = true;
                            updateScore(3, false);
                        }
                    }
                }
            }

            // C) GRAVEDAD Y LÓGICA DE REBOTE
            if (ball.position.y < ballRadius) {
                ball.position.y = ballRadius; 
                
                if (mode !== 'RUN') {
                    velocity.y *= -0.6; velocity.z *= 0.8; velocity.x *= 0.8; spin *= 0.5; 
                    
                    if (Math.abs(velocity.y) < 1 && Math.abs(velocity.z) < 1) {
                        if(!hasScoredThisShot) updateScore(0, true); 
                        resetPlay();
                    }
                } else {
                    velocity.y = 0; spin *= 0.9;
                }
            }

            // D) VALLAS RUN - COLISIONES PERFECTAS CON BOX3
            if (mode === 'RUN') {
                runSpeedMultiplier += dt * 0.08; 
                if(runSpeedMultiplier > 3.5) runSpeedMultiplier = 3.5; 
                
                hurdle.position.z += (20 * runSpeedMultiplier) * dt; 
                
                // Actualizar Box3 en cada frame para interceptar la bola
                hurdle.updateMatrixWorld(true);
                hurdleBox.setFromObject(hurdleCollisionVolume);
                
                // Reset de Valla exitosa
                if (hurdle.position.z > 5) {
                    hurdle.position.z = -40; 
                    updateScore(1, false);
                }

                // Hitbox Matemático de Destrucción
                if (hurdleBox.intersectsSphere(ballSphere)) {
                    updateScore(0, true); // Romper racha sin piedad
                    runSpeedMultiplier = 1; 
                    hurdle.position.z = -40; // Alejar valla para evitar doble colisión
                    velocity.y = 0; // Cancelar salto abruptamente para dar feedback visual
                    document.getElementById('app-container').style.boxShadow = "inset 0 0 50px rgba(255,0,0,0.8)";
                    setTimeout(() => document.getElementById('app-container').style.boxShadow = "0 0 30px rgba(0,0,0,0.8)", 200);
                }
            }
        }

        // Ilusión óptica de velocidad en pista de Vallas
        if(mode === 'RUN' && isMoving) {
            grid.position.z += (20 * runSpeedMultiplier) * dt;
            if(grid.position.z > 10) grid.position.z -= 10;
        }

        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
