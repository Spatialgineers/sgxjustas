<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SGX - Swipe Core Engine</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        * { box-sizing: border-box; }
        body { margin: 0; overflow: hidden; background-color: #050508; font-family: 'Share Tech Mono', monospace; color: #FDCC0D; user-select: none; touch-action: none; }
        
        #ui { position: absolute; top: 15px; left: 15px; z-index: 10; display: flex; gap: 10px; flex-wrap: wrap; width: 90%;}
        
        button { 
            background: rgba(50, 82, 123, 0.6); color: #FDCC0D; border: none; 
            border-left: 3px solid #FDCC0D; border-right: 3px solid #FDCC0D;
            padding: 10px 15px; font-family: 'Share Tech Mono', monospace; font-size: 14px; 
            cursor: pointer; text-transform: uppercase; font-weight: bold;
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
            backdrop-filter: blur(4px); transition: 0.2s;
        }
        button:hover, button.active { background: rgba(0, 255, 255, 0.2); color: #fff; border-color: #00FFFF; }

        #hud { position: absolute; bottom: 40px; width: 100%; text-align: center; color: #00FFFF; font-size: 16px; text-shadow: 0 0 10px #00FFFF; pointer-events: none; }
        #score-display { position: absolute; top: 70px; left: 15px; font-size: 24px; font-weight: bold; color: #fff; text-shadow: 0 0 10px #fff;}
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui">
        <button id="btn-run" onclick="setMode('RUN')">1. VALLAS</button>
        <button id="btn-basket" onclick="setMode('BASKET')">2. BASKET</button>
        <button id="btn-soccer" onclick="setMode('SOCCER')">3. SOCCER</button>
    </div>
    <div id="score-display">PUNTOS: 0</div>
    <div id="hud">HAZ SWIPE UP PARA EMPEZAR</div>

<script>
    // 1. ARQUITECTURA BASE 3D (CÁMARA ESTÁTICA)
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x050508, 0.015);
    
    // La cámara no se mueve. Se queda fija detrás de la bola.
    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x050508);
    document.body.appendChild(renderer.domElement);

    // Luces
    scene.add(new THREE.AmbientLight(0xffffff, 0.5));
    const dirLight = new THREE.DirectionalLight(0xFDCC0D, 1);
    dirLight.position.set(10, 20, 10);
    scene.add(dirLight);

    const grid = new THREE.GridHelper(200, 50, 0x32527B, 0x111111);
    scene.add(grid);

    // 2. PRIMITIVAS Y ASSETS
    const ballRadius = 0.8;
    const ball = new THREE.Mesh(new THREE.SphereGeometry(ballRadius, 32, 32), new THREE.MeshStandardMaterial({ color: 0xff5500 }));
    scene.add(ball);

    // Canasto (Basket)
    const hoop = new THREE.Group();
    const ring = new THREE.Mesh(new THREE.TorusGeometry(1.2, 0.1, 16, 32), new THREE.MeshStandardMaterial({ color: 0x00FFFF }));
    ring.rotation.x = Math.PI / 2;
    hoop.add(ring);
    const board = new THREE.Mesh(new THREE.BoxGeometry(4, 3, 0.1), new THREE.MeshStandardMaterial({ color: 0xffffff, transparent: true, opacity: 0.5 }));
    board.position.set(0, 1.5, -1.3);
    hoop.add(board);
    scene.add(hoop);

    // Portería (Soccer)
    const goal = new THREE.Mesh(new THREE.BoxGeometry(8, 4, 2), new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true }));
    scene.add(goal);

    // Valla (Run)
    const hurdle = new THREE.Mesh(new THREE.BoxGeometry(6, 2, 0.5), new THREE.MeshStandardMaterial({ color: 0xFF0055 }));
    scene.add(hurdle);

    // 3. ESTADOS Y FÍSICAS
    let mode = 'NONE';
    let isMoving = false;
    let velocity = new THREE.Vector3();
    const gravity = -60; // Gravedad fuerte para que caiga rápido y no flote
    let score = 0;

    // Posición inicial de la bola (Punto de saque)
    const startPos = new THREE.Vector3(0, ballRadius, 0);

    function setMode(newMode) {
        mode = newMode;
        isMoving = false;
        velocity.set(0,0,0);
        ball.position.copy(startPos);
        
        document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + mode.toLowerCase()).classList.add('active');

        // Resetear visuales
        hoop.visible = false; goal.visible = false; hurdle.visible = false;

        if(mode === 'BASKET') {
            camera.position.set(0, 4, 10);
            camera.lookAt(0, 4, -15);
            hoop.visible = true;
            hoop.position.set(0, 8, -25); // Canasto lejos y alto
            ball.material.color.setHex(0xff5500);
            document.getElementById('hud').innerText = "SWIPE UP RÁPIDO PARA TIRAR AL ARO";
        } 
        else if(mode === 'SOCCER') {
            camera.position.set(0, 3, 10);
            camera.lookAt(0, 1, -20);
            goal.visible = true;
            goal.position.set(0, 2, -30); // Portería lejos
            ball.material.color.setHex(0xffffff);
            document.getElementById('hud').innerText = "SWIPE UP PARA PATEAR (CURVA CON SWIPE DIAGONAL)";
        }
        else if(mode === 'RUN') {
            camera.position.set(0, 4, 8);
            camera.lookAt(0, 1, -10);
            hurdle.visible = true;
            hurdle.position.set(0, 1, -30);
            ball.material.color.setHex(0x32527B); 
            document.getElementById('hud').innerText = "SWIPE UP PARA SALTAR LA VALLA";
            isMoving = true; // El juego corre automáticamente
        }
    }

    // 4. MOTOR DE SWIPE (El nuevo Input System)
    let touchStart = { y: 0, x: 0, time: 0 };

    window.addEventListener('pointerdown', (e) => {
        if(e.target.tagName === 'BUTTON') return;
        touchStart.y = e.clientY;
        touchStart.x = e.clientX;
        touchStart.time = Date.now();
    });

    window.addEventListener('pointerup', (e) => {
        if(mode === 'NONE' || (isMoving && mode !== 'RUN')) return;

        let deltaY = touchStart.y - e.clientY; // Positivo si es swipe hacia arriba
        let deltaX = e.clientX - touchStart.x; // Dirección horizontal
        let timeLapse = (Date.now() - touchStart.time) / 1000; // Tiempo en segundos

        if (deltaY > 30 && timeLapse < 1.0) { // Validar que fue un Swipe rápido hacia arriba
            
            // Calcular la potencia basada en distancia del swipe y qué tan rápido se hizo
            let swipeSpeed = deltaY / timeLapse; 
            
            // Limitar la potencia máxima
            if(swipeSpeed > 2500) swipeSpeed = 2500;

            if (mode === 'RUN') {
                // En modo Run, el swipe solo afecta el salto (Y)
                if(ball.position.y <= ballRadius + 0.1) {
                    velocity.y = 20; // Brinco
                }
            } else {
                // En Basket y Soccer, el swipe lanza la bola hacia adelante (-Z) y hacia arriba (Y)
                isMoving = true;
                
                // Mapeo de la fuerza a vectores 3D (Multiplicadores ajustables)
                let zForce = swipeSpeed * 0.02; // Profundidad
                let yForce = swipeSpeed * 0.015; // Altura
                let xForce = deltaX * 0.05; // Dirección lateral (Curva/Puntería)

                if (mode === 'BASKET') {
                    velocity.set(xForce, yForce * 1.5, -zForce); // Más arco
                } else if (mode === 'SOCCER') {
                    velocity.set(xForce, yForce * 0.6, -zForce * 1.2); // Más directo, menos altura
                }
            }
        }
    });

    // 5. LOOP FÍSICO Y RENDER
    const clock = new THREE.Clock();

    function animate() {
        requestAnimationFrame(animate);
        let dt = clock.getDelta();

        if (isMoving) {
            // Aplicar Gravedad
            velocity.y += gravity * dt;
            ball.position.addScaledVector(velocity, dt);

            // Choque con el piso
            if (ball.position.y < ballRadius) {
                ball.position.y = ballRadius;
                
                if (mode !== 'RUN') {
                    // Física de rebote para Basket y Soccer
                    velocity.y *= -0.5; 
                    velocity.z *= 0.8; 
                    velocity.x *= 0.8; 
                    
                    if (Math.abs(velocity.y) < 1 && Math.abs(velocity.z) < 1) {
                        isMoving = false;
                        setTimeout(() => setMode(mode), 1000); // Reset de la bola
                    }
                } else {
                    velocity.y = 0; // En modo Run, aterriza y sigue "corriendo"
                }
            }

            // LÓGICA DE ILUSIÓN DE MOVIMIENTO (Modo RUN)
            if (mode === 'RUN') {
                // La bola y la cámara NO se mueven en Z. La valla viene hacia la cámara.
                hurdle.position.z += 20 * dt; // Velocidad del mundo hacia el jugador

                // Si la valla pasa detrás de la cámara, reciclarla
                if (hurdle.position.z > 5) {
                    hurdle.position.z = -40; // Mandarla lejos de nuevo
                    score += 10;
                    document.getElementById('score-display').innerText = "PUNTOS: " + score;
                }

                // Detección de Colisión (Si la valla choca con la bola)
                if (Math.abs(hurdle.position.z - ball.position.z) < 1.5 && ball.position.y < hurdle.position.y + 1) {
                    score -= 5; // Castigo
                    document.getElementById('score-display').innerText = "PUNTOS: " + score;
                    hurdle.position.z = -40; // Resetear la valla inmediatamente para no atascarse
                }
            }
        }

        renderer.render(scene, camera);
    }
    animate();

    // Iniciar con Vallas por defecto para que se vea acción inmediata
    setMode('RUN');
</script>
</body>
</html>
