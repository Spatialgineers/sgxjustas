<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SGX Justas Challenge</title>
    <style>
        :root {
            --primary: #008f39; /* Verde Colegio/SGX */
            --dark: #0a0a0a;
            --card: #1a1a1a;
            --text: #f4f4f4;
            --accent: #FDCC0D; /* SGX Yellow */
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; touch-action: none; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        
        body { background-color: var(--dark); color: var(--text); overflow: hidden; }

        /* OVERLAY DE SELECCIÓN DE UNIVERSIDAD (EL HOOK) */
        #uni-selector {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 10, 10, 0.95); z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            backdrop-filter: blur(10px); padding: 20px;
        }
        #uni-selector h1 { font-size: 28px; text-transform: uppercase; color: var(--accent); margin-bottom: 5px; text-align: center; }
        #uni-selector p { color: #aaa; margin-bottom: 30px; font-size: 14px; text-align: center; }
        
        .uni-btn {
            width: 100%; max-width: 300px; padding: 15px; margin-bottom: 15px;
            background: transparent; border: 2px solid; border-radius: 8px;
            font-size: 18px; font-weight: bold; color: white; cursor: pointer;
            text-transform: uppercase; letter-spacing: 1px; transition: 0.2s;
        }
        .uni-uprm { border-color: #008f39; } .uni-uprm:active { background: #008f39; }
        .uni-inter { border-color: #FDCC0D; color: #FDCC0D;} .uni-inter:active { background: #FDCC0D; color: black;}
        .uni-iupi { border-color: #cc0000; } .uni-iupi:active { background: #cc0000; }
        .uni-sagrado { border-color: #ff007f; } .uni-sagrado:active { background: #ff007f; }

        /* UI DEL JUEGO */
        #game-ui { display: none; }
        #nav-modes { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); z-index: 10; display: flex; gap: 10px; background: rgba(0,0,0,0.5); padding: 5px; border-radius: 30px; border: 1px solid #333; }
        
        .mode-btn { 
            background: transparent; color: #888; border: none; 
            border-radius: 25px; padding: 10px 20px; font-size: 12px; 
            cursor: pointer; font-weight: bold; text-transform: uppercase; transition: 0.3s;
        }
        .mode-btn.active { background: var(--accent); color: #000; box-shadow: 0 0 15px rgba(253, 204, 13, 0.5); }

        #score-board { position: absolute; top: 80px; width: 100%; text-align: center; pointer-events: none; }
        #score-val { font-size: 40px; font-weight: 900; color: white; text-shadow: 0 0 20px var(--accent); line-height: 1; }
        #streak-val { font-size: 16px; color: var(--accent); font-weight: bold; text-transform: uppercase; letter-spacing: 2px; }

        #hype-text { 
            position: absolute; top: 40%; width: 100%; text-align: center; 
            font-size: 45px; font-weight: 900; color: #fff; text-transform: uppercase;
            pointer-events: none; opacity: 0; transform: scale(0.5); transition: 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-shadow: 0px 5px 0px #000, 0 0 20px var(--primary); z-index: 50;
        }

        #hud { position: absolute; bottom: 40px; width: 100%; text-align: center; font-size: 14px; font-weight: bold; letter-spacing: 1px; pointer-events: none; color: #888; text-transform: uppercase; }
        
        #brand-tag { position: absolute; bottom: 10px; width: 100%; text-align: center; font-size: 10px; color: #444; pointer-events: none; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="uni-selector">
        <h1>Elige tu Sangre</h1>
        <p>¿A quién representas en las Justas?</p>
        <button class="uni-btn uni-uprm" onclick="startGame('Colegio')">Colegio (UPRM)</button>
        <button class="uni-btn uni-inter" onclick="startGame('Tigres')">Interamericana</button>
        <button class="uni-btn uni-iupi" onclick="startGame('Gallitos')">La Iupi (UPRRP)</button>
        <button class="uni-btn uni-sagrado" onclick="startGame('Delfines')">Sagrado</button>
    </div>

    <div id="game-ui">
        <div id="nav-modes">
            <button id="btn-run" class="mode-btn" onclick="setMode('RUN')">Vallas</button>
            <button id="btn-basket" class="mode-btn" onclick="setMode('BASKET')">Basket</button>
            <button id="btn-soccer" class="mode-btn" onclick="setMode('SOCCER')">Fútbol</button>
        </div>
        
        <div id="score-board">
            <div id="score-val">0</div>
            <div id="streak-val">Racha x1</div>
        </div>

        <div id="hype-text">¡SWISH!</div>
        <div id="hud">Haz swipe para interactuar</div>
        <div id="brand-tag">SGX.SPARK ENGINE</div>
    </div>

<script>
    let playerTeam = "";
    let teamColor = 0x008f39;

    function startGame(team) {
        playerTeam = team;
        document.getElementById('uni-selector').style.display = 'none';
        document.getElementById('game-ui').style.display = 'block';
        
        // Cambiar colores estéticos según universidad para dar sentido de pertenencia
        if(team === 'Colegio') teamColor = 0x008f39;
        if(team === 'Tigres') teamColor = 0xFDCC0D;
        if(team === 'Gallitos') teamColor = 0xcc0000;
        if(team === 'Delfines') teamColor = 0xff007f;
        
        grid.material.color.setHex(teamColor);
        ballLight.color.setHex(teamColor);
        document.getElementById('streak-val').style.color = '#' + teamColor.toString(16).padStart(6, '0');
        
        setMode('BASKET'); // Default mode
    }

    // 1. ARQUITECTURA ESTÉTICA (Cyber / Night Mode)
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050505);
    scene.fog = new THREE.FogExp2(0x050505, 0.025); // Neblina densa para esconder el horizonte
    
    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    // Luces Dramáticas
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.2);
    scene.add(ambientLight);

    const mainLight = new THREE.DirectionalLight(0xffffff, 1.5);
    mainLight.position.set(0, 20, 10);
    scene.add(mainLight);

    // El piso holográfico (TRON Vibe)
    const grid = new THREE.GridHelper(200, 100, 0x008f39, 0x111111);
    grid.position.y = 0;
    scene.add(grid);

    // 2. ACTIVOS (CON MATERIALES DE NEÓN/CIBERNÉTICOS)
    const ballRadius = 0.8;
    // Bola principal
    const ballMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.2, metalness: 0.8 });
    const ball = new THREE.Mesh(new THREE.SphereGeometry(ballRadius, 32, 32), ballMat);
    scene.add(ball);

    // Bola Wireframe externa (Da un look futurista)
    const ballWire = new THREE.Mesh(new THREE.SphereGeometry(ballRadius + 0.05, 16, 16), new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true, transparent: true, opacity: 0.3 }));
    ball.add(ballWire);

    // Luz dinámica pegada a la bola (Ilumina el ambiente cuando vuela)
    const ballLight = new THREE.PointLight(0x008f39, 2, 15);
    ball.add(ballLight);

    // Canasto (Basket) - Neón
    const hoop = new THREE.Group();
    const ring = new THREE.Mesh(new THREE.TorusGeometry(1.2, 0.1, 16, 32), new THREE.MeshBasicMaterial({ color: 0xff4400 })); // Aro incandescente
    ring.rotation.x = Math.PI / 2;
    hoop.add(ring);
    
    const board = new THREE.Mesh(new THREE.BoxGeometry(4, 3, 0.2), new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.5, metalness: 0.8, transparent: true, opacity: 0.8 }));
    board.position.set(0, 1.5, -1.3);
    
    // Borde de neón para el tablero
    const boardEdge = new THREE.EdgesGeometry(new THREE.BoxGeometry(4, 3, 0.2));
    const boardLine = new THREE.LineSegments(boardEdge, new THREE.LineBasicMaterial({ color: 0xffffff, linewidth: 2 }));
    boardLine.position.set(0, 1.5, -1.3);
    hoop.add(board, boardLine);
    scene.add(hoop);
    const boardBox = new THREE.Box3();

    // Portería (Soccer)
    const goal = new THREE.Group();
    const postMat = new THREE.MeshBasicMaterial({ color: 0xffffff }); // Emisivo
    const postGeo = new THREE.CylinderGeometry(0.15, 0.15, 4);
    const leftPost = new THREE.Mesh(postGeo, postMat); leftPost.position.set(-4, 2, 0);
    const rightPost = new THREE.Mesh(postGeo, postMat); rightPost.position.set(4, 2, 0);
    const topBar = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.15, 8.3), postMat); topBar.rotation.z = Math.PI / 2; topBar.position.set(0, 4, 0);
    
    const netArea = new THREE.Mesh(new THREE.BoxGeometry(8, 4, 2), new THREE.MeshBasicMaterial({ visible: false }));
    netArea.position.set(0, 2, -1);
    goal.add(leftPost, rightPost, topBar, netArea);
    scene.add(goal);
    const goalBox = new THREE.Box3();

    // Valla (Run)
    const hurdle = new THREE.Group();
    const hBar = new THREE.Mesh(new THREE.BoxGeometry(6, 0.3, 0.3), new THREE.MeshBasicMaterial({ color: 0xff0055 }));
    hBar.position.y = 1.5;
    const hLegL = new THREE.Mesh(new THREE.BoxGeometry(0.3, 1.5, 0.3), new THREE.MeshStandardMaterial({color: 0x333333}));
    hLegL.position.set(-2.85, 0.75, 0);
    const hLegR = hLegL.clone(); hLegR.position.set(2.85, 0.75, 0);
    hurdle.add(hBar, hLegL, hLegR);
    scene.add(hurdle);

    // 3. FÍSICAS Y SISTEMA DE "JUICE" (Game Feel)
    let mode = 'NONE';
    let isMoving = false;
    let velocity = new THREE.Vector3();
    let spin = 0;
    const gravity = -35; 
    let score = 0;
    let streak = 1;
    let runSpeedMultiplier = 1;

    const startPos = new THREE.Vector3(0, ballRadius, 0);

    // HYPE SYSTEM (Feedback de texto dinámico)
    const hypeEl = document.getElementById('hype-text');
    function showHype(type) {
        let msg = "";
        if(type === 'score_basket') msg = ["¡SWISH!", "¡ROMPIENDO TOBILLOS!", "¡FUEGO!", "¡" + playerTeam.toUpperCase() + "!" ][Math.floor(Math.random()*4)];
        if(type === 'score_soccer') msg = ["¡GOLAZO!", "¡AL ÁNGULO!", "¡IMPARABLE!"][Math.floor(Math.random()*3)];
        if(type === 'miss') { msg = ["BRICK", "AIRE", "MALA MÍA", "PA' FUERA"][Math.floor(Math.random()*4)]; hypeEl.style.color = "#ff0000"; } 
        else { hypeEl.style.color = "#fff"; }
        
        hypeEl.innerText = msg;
        hypeEl.style.opacity = 1;
        hypeEl.style.transform = "scale(1)";
        
        setTimeout(() => {
            hypeEl.style.opacity = 0;
            hypeEl.style.transform = "scale(0.5)";
        }, 1000);
    }

    function updateScore(points, isMiss = false) {
        if(isMiss) {
            streak = 1;
            showHype('miss');
        } else {
            score += (points * streak);
            streak++;
            if(mode === 'BASKET') showHype('score_basket');
            if(mode === 'SOCCER') showHype('score_soccer');
        }
        
        document.getElementById('score-val').innerText = score;
        document.getElementById('streak-val').innerText = streak > 1 ? `Racha x${streak}` : "";
        
        // Pequeño shake de cámara de UI
        document.getElementById('score-val').style.transform = "scale(1.2)";
        setTimeout(() => document.getElementById('score-val').style.transform = "scale(1)", 150);
    }

    function setMode(newMode) {
        mode = newMode;
        isMoving = false;
        velocity.set(0,0,0);
        spin = 0;
        streak = 1;
        score = 0;
        runSpeedMultiplier = 1;
        updateScore(0, false);
        ball.position.copy(startPos);
        ball.rotation.set(0,0,0);

        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + mode.toLowerCase()).classList.add('active');

        hoop.visible = false; goal.visible = false; hurdle.visible = false;
        ballWire.material.color.setHex(teamColor);

        if(mode === 'BASKET') {
            camera.position.set(0, 4, 12); camera.lookAt(0, 6, -15);
            hoop.visible = true; hoop.position.set(0, 7, -20);
            hoop.updateMatrixWorld(true); boardBox.setFromObject(board);
            ballMat.color.setHex(0xd55e00);
            document.getElementById('hud').innerText = "Swipe para lanzar";
        } 
        else if(mode === 'SOCCER') {
            camera.position.set(0, 3, 12); camera.lookAt(0, 1, -20);
            goal.visible = true; goal.position.set(0, 0, -25); 
            goal.updateMatrixWorld(true); goalBox.setFromObject(goal);
            ballMat.color.setHex(0xffffff); ballWire.material.color.setHex(0x000000);
            document.getElementById('hud').innerText = "Swipe diagonal para curvar";
        }
        else if(mode === 'RUN') {
            camera.position.set(0, 4, 8); camera.lookAt(0, 1, -10);
            hurdle.visible = true; hurdle.position.set(0, 0, -25);
            ballMat.color.setHex(teamColor); ballWire.material.color.setHex(0xffffff);
            document.getElementById('hud').innerText = "Swipe arriba para saltar";
            isMoving = true; 
        }
    }

    // 4. LÓGICA DE SWIPE Acelerada
    let touchStart = { y: 0, x: 0, time: 0 };

    window.addEventListener('pointerdown', (e) => {
        if(e.target.tagName === 'BUTTON') return;
        touchStart.y = e.clientY; touchStart.x = e.clientX; touchStart.time = Date.now();
    });

    window.addEventListener('pointerup', (e) => {
        if(mode === 'NONE' || (isMoving && mode !== 'RUN')) return;

        let deltaY = touchStart.y - e.clientY; 
        let deltaX = e.clientX - touchStart.x; 
        let timeLapse = (Date.now() - touchStart.time) / 1000; 

        if (deltaY > 20 && timeLapse < 0.8) { 
            let swipeSpeed = deltaY / timeLapse; 
            if(swipeSpeed > 3000) swipeSpeed = 3000; // Cap para no romper la física

            if (mode === 'RUN') {
                if(ball.position.y <= ballRadius + 0.1) velocity.y = 17; // Salto
            } else {
                isMoving = true;
                let zForce = swipeSpeed * 0.016; 
                let yForce = swipeSpeed * 0.013; 
                let xForce = deltaX * 0.05; 
                spin = deltaX * 0.05; 

                if (mode === 'BASKET') velocity.set(xForce, yForce * 1.5, -zForce); 
                else if (mode === 'SOCCER') velocity.set(xForce, yForce * 0.8, -zForce * 1.3); 
            }
        }
    });

    // 5. MOTOR FÍSICO
    const clock = new THREE.Clock();
    const ballSphere = new THREE.Sphere();
    let hasScoredThisShot = false;

    function animate() {
        requestAnimationFrame(animate);
        let dt = clock.getDelta();
        if(dt > 0.1) dt = 0.1; 

        if (isMoving) {
            if(mode !== 'RUN') {
                velocity.z *= 0.99; velocity.x *= 0.99;
                if(mode === 'SOCCER' && ball.position.y > ballRadius) velocity.x -= spin * dt * 2.5; // Efecto Magnus más agresivo
            }

            velocity.y += gravity * dt;
            ball.position.addScaledVector(velocity, dt);
            
            ball.rotation.x += velocity.z * dt * 0.5;
            ball.rotation.z -= velocity.x * dt * 0.5;
            ball.rotation.y += spin * dt;

            ballSphere.set(ball.position, ballRadius);

            // A) BASKETBALL LOGIC
            if (mode === 'BASKET') {
                if (boardBox.intersectsSphere(ballSphere)) {
                    let intersectionDepth = ballSphere.radius - Math.abs(boardBox.max.z - ballSphere.center.z);
                    if(intersectionDepth > 0 && velocity.z < 0) ball.position.z += intersectionDepth + 0.05;
                    velocity.z *= -0.4; velocity.y *= 0.8; velocity.x *= 0.8;
                }
                
                // Detección de "Canasta" simplificada (Pasa por el aro hacia abajo)
                if(!hasScoredThisShot && velocity.y < 0 && Math.abs(ball.position.x) < 1.0 && Math.abs(ball.position.z - hoop.position.z) < 1.0 && ball.position.y < 7 && ball.position.y > 6) {
                    hasScoredThisShot = true;
                    updateScore(2, false);
                }
            }

            // B) SOCCER LOGIC
            if (mode === 'SOCCER') {
                if (goalBox.intersectsSphere(ballSphere)) {
                    if (velocity.z < 0 && ball.position.z < goalBox.max.z) {
                        ball.position.z = goalBox.max.z + ballRadius; 
                        velocity.z *= -0.2; velocity.x *= 0.5; velocity.y *= 0.5;
                        if(!hasScoredThisShot) {
                            hasScoredThisShot = true;
                            updateScore(3, false);
                        }
                    }
                }
            }

            // C) REBOTE Y RESET
            if (ball.position.y < ballRadius) {
                ball.position.y = ballRadius; 
                
                if (mode !== 'RUN') {
                    velocity.y *= -0.6; velocity.z *= 0.8; velocity.x *= 0.8; spin *= 0.5; 
                    
                    if (Math.abs(velocity.y) < 1 && Math.abs(velocity.z) < 1) {
                        isMoving = false;
                        if(!hasScoredThisShot) updateScore(0, true); // Si terminó el tiro y no encestó, reset racha
                        hasScoredThisShot = false;
                        setTimeout(() => setMode(mode), 800); 
                    }
                } else {
                    velocity.y = 0; spin *= 0.9;
                }
            }

            // D) VALLAS (RUN) - Dificultad Progresiva
            if (mode === 'RUN') {
                runSpeedMultiplier += dt * 0.05; // Acelera poco a poco
                if(runSpeedMultiplier > 3) runSpeedMultiplier = 3; // Cap de velocidad
                
                hurdle.position.z += (20 * runSpeedMultiplier) * dt; 
                
                if (hurdle.position.z > 5) {
                    hurdle.position.z = -40; 
                    updateScore(1, false);
                }

                if (Math.abs(hurdle.position.z - ball.position.z) < 1.5 && ball.position.y < hurdle.position.y + ballRadius) {
                    updateScore(0, true); // Chocó
                    runSpeedMultiplier = 1; // Reset velocidad
                    hurdle.position.z = -40; 
                }
            }
        }

        // Simular movimiento del piso en modo RUN
        if(mode === 'RUN' && isMoving) {
            grid.position.z += (20 * runSpeedMultiplier) * dt;
            if(grid.position.z > 10) grid.position.z -= 10;
        }

        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
