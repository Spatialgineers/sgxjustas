<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SGX Justas Challenge</title>
    <style>
        :root {
            --primary: #008f39; /* Verde Mayagüez */
            --dark: #121212;
            --text: #f4f4f4;
            --accent: #FDCC0D; /* SGX Yellow */
        }
        * { box-sizing: border-box; }
        body { 
            margin: 0; overflow: hidden; background-color: #050505; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            user-select: none; touch-action: none; 
        }
        
        /* BRANDING UI OVERLAY */
        #ui { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); z-index: 10; display: flex; gap: 8px; width: 90%; max-width: 400px; justify-content: center; }
        
        button { 
            background: rgba(30, 30, 30, 0.8); color: var(--text); 
            border: 1px solid #333; border-radius: 8px; padding: 10px 15px; 
            font-size: 13px; cursor: pointer; font-weight: 700; transition: 0.2s;
            backdrop-filter: blur(5px); text-transform: uppercase; flex: 1;
        }
        button.active { 
            background: var(--primary); color: #fff; border-color: var(--accent); 
            box-shadow: 0 0 15px rgba(0, 143, 57, 0.5);
        }

        #hud { position: absolute; bottom: 40px; width: 100%; text-align: center; font-size: 14px; font-weight: 600; pointer-events: none; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
        
        #score-display { 
            position: absolute; top: 80px; left: 50%; transform: translateX(-50%); 
            font-size: 32px; font-weight: 900; color: var(--text); 
            text-shadow: 0 4px 10px rgba(0,0,0,0.8); text-transform: uppercase;
        }
        .streak-lost { color: #ff3333 !important; text-shadow: 0 0 20px rgba(255,0,0,0.8) !important; }

        .btn-back {
            position: absolute; top: 25px; left: 20px; color: var(--accent); 
            font-weight: bold; cursor: pointer; z-index: 20; font-size: 24px; text-decoration: none;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <a href="index.html" class="btn-back">←</a>

    <div id="ui">
        <button id="btn-run" onclick="setMode('RUN')">Vallas</button>
        <button id="btn-basket" onclick="setMode('BASKET')">Basket</button>
        <button id="btn-soccer" onclick="setMode('SOCCER')">Soccer</button>
    </div>
    <div id="score-display">0 pts</div>
    <div id="hud">Haz swipe hacia arriba para lanzar</div>

<script>
    // 1. ARQUITECTURA BASE (Dark Mode Stadium Vibe)
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x121212);
    scene.fog = new THREE.Fog(0x121212, 10, 60);
    
    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    // Iluminación dramática (Estadio)
    const hemiLight = new THREE.HemisphereLight(0xffffff, 0x000000, 0.3);
    scene.add(hemiLight);

    const spotLight = new THREE.SpotLight(0xffffff, 1.5);
    spotLight.position.set(0, 30, 10);
    spotLight.angle = Math.PI / 4;
    spotLight.penumbra = 0.5;
    spotLight.castShadow = true;
    spotLight.shadow.mapSize.width = 1024;
    spotLight.shadow.mapSize.height = 1024;
    scene.add(spotLight);

    // Piso Oscuro
    const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(200, 200), 
        new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.9, metalness: 0.1 })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    scene.add(floor);

    // 2. ACTIVOS Y CAJAS DE COLISIÓN
    const ballRadius = 0.8;
    const ball = new THREE.Mesh(
        new THREE.SphereGeometry(ballRadius, 32, 32), 
        new THREE.MeshStandardMaterial({ color: 0xFDCC0D, roughness: 0.4, metalness: 0.2 }) // SGX Yellow
    );
    ball.castShadow = true;
    scene.add(ball);

    // Canasto (Basket)
    const hoop = new THREE.Group();
    const ring = new THREE.Mesh(
        new THREE.TorusGeometry(1.2, 0.1, 16, 32), 
        new THREE.MeshStandardMaterial({ color: 0xFDCC0D, roughness: 0.5 })
    );
    ring.rotation.x = Math.PI / 2;
    ring.castShadow = true;
    hoop.add(ring);
    
    const board = new THREE.Mesh(
        new THREE.BoxGeometry(4, 3, 0.2), 
        new THREE.MeshStandardMaterial({ color: 0x008f39, roughness: 0.2 }) // SGX Green
    );
    board.position.set(0, 1.5, -1.3);
    board.castShadow = true;
    hoop.add(board);
    scene.add(hoop);
    const boardBox = new THREE.Box3();

    // Portería (Soccer)
    const goal = new THREE.Group();
    const postMat = new THREE.MeshStandardMaterial({ color: 0xFDCC0D, roughness: 0.3, emissive: 0x332200 });
    const leftPost = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.15, 4), postMat);
    leftPost.position.set(-4, 2, 0);
    leftPost.castShadow = true;
    const rightPost = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.15, 4), postMat);
    rightPost.position.set(4, 2, 0);
    rightPost.castShadow = true;
    const topBar = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.15, 8.3), postMat);
    topBar.rotation.z = Math.PI / 2;
    topBar.position.set(0, 4, 0);
    topBar.castShadow = true;

    const netArea = new THREE.Mesh(new THREE.BoxGeometry(8, 4, 2), new THREE.MeshBasicMaterial({ visible: false }));
    netArea.position.set(0, 2, -1);
    goal.add(leftPost, rightPost, topBar, netArea);
    scene.add(goal);
    const goalBox = new THREE.Box3(); 

    // Valla (Run)
    const hurdle = new THREE.Mesh(
        new THREE.BoxGeometry(6, 1.5, 0.5), 
        new THREE.MeshStandardMaterial({ color: 0x008f39, roughness: 0.6 }) // SGX Green
    );
    hurdle.castShadow = true;
    scene.add(hurdle);

    // 3. FÍSICAS FLUIDAS Y ESTADOS
    let mode = 'NONE';
    let isMoving = false;
    let velocity = new THREE.Vector3();
    let spin = 0; 
    const gravity = -35; 
    let score = 0;
    
    // Variables de Dificultad Dinámica
    let soccerDistance = 20; 

    const startPos = new THREE.Vector3(0, ballRadius, 0);
    const scoreDisplay = document.getElementById('score-display');

    function updateScore(points) {
        score += points;
        scoreDisplay.innerText = score + " pts";
        scoreDisplay.classList.remove('streak-lost');
    }

    function resetTurn() {
        isMoving = false;
        velocity.set(0,0,0);
        spin = 0;
        ball.position.copy(startPos);
        ball.rotation.set(0,0,0);

        if (mode === 'SOCCER') {
            // Randomizer: Mueve la portería de lado a lado y la aleja
            let randX = (Math.random() - 0.5) * 12; // Entre -6 y 6
            goal.position.set(randX, 0, -soccerDistance);
            goal.updateMatrixWorld(true);
            goalBox.setFromObject(goal);
        }
    }

    function setMode(newMode) {
        mode = newMode;
        score = 0;
        updateScore(0);
        soccerDistance = 20; // Reset dificultad
        resetTurn();

        document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + mode.toLowerCase()).classList.add('active');

        hoop.visible = false; goal.visible = false; hurdle.visible = false;

        if(mode === 'BASKET') {
            camera.position.set(0, 4, 10);
            camera.lookAt(0, 5, -15);
            hoop.visible = true;
            hoop.position.set(0, 7, -20); 
            ball.material.color.setHex(0xd55e00); // Color basket real
            document.getElementById('hud').innerText = "Tablero en movimiento. Calcula el tiro.";
        } 
        else if(mode === 'SOCCER') {
            camera.position.set(0, 3, 12);
            camera.lookAt(0, 1, -20);
            goal.visible = true;
            ball.material.color.setHex(0xffffff); // Color soccer real
            document.getElementById('hud').innerText = "Curva la bola. Cada gol aleja la portería.";
            resetTurn(); // Forzar posicionamiento aleatorio inicial
        }
        else if(mode === 'RUN') {
            camera.position.set(0, 4, 8);
            camera.lookAt(0, 1, -10);
            hurdle.visible = true;
            hurdle.position.set(0, 0.75, -25);
            ball.material.color.setHex(0xFDCC0D); // SGX Yellow para vallas
            document.getElementById('hud').innerText = "Racha: Salta deslizando hacia arriba.";
            isMoving = true; 
        }
    }

    // 4. LÓGICA DE SWIPE
    let touchStart = { y: 0, x: 0, time: 0 };

    window.addEventListener('pointerdown', (e) => {
        if(e.target.tagName === 'BUTTON' || e.target.tagName === 'A') return;
        touchStart.y = e.clientY;
        touchStart.x = e.clientX;
        touchStart.time = Date.now();
    });

    window.addEventListener('pointerup', (e) => {
        if(mode === 'NONE' || (isMoving && mode !== 'RUN')) return;

        let deltaY = touchStart.y - e.clientY; 
        let deltaX = e.clientX - touchStart.x; 
        let timeLapse = (Date.now() - touchStart.time) / 1000; 

        if (deltaY > 20 && timeLapse < 0.8) { 
            let swipeSpeed = deltaY / timeLapse; 
            if(swipeSpeed > 2800) swipeSpeed = 2800;

            if (mode === 'RUN') {
                if(ball.position.y <= ballRadius + 0.1) {
                    velocity.y = 16; 
                }
            } else {
                isMoving = true;
                let zForce = swipeSpeed * 0.015; 
                let yForce = swipeSpeed * 0.012; 
                let xForce = deltaX * 0.05; 
                spin = deltaX * 0.04; 

                if (mode === 'BASKET') {
                    velocity.set(xForce, yForce * 1.5, -zForce); 
                } else if (mode === 'SOCCER') {
                    velocity.set(xForce, yForce * 0.8, -zForce * 1.3); 
                }
            }
        }
    });

    // 5. MOTOR FÍSICO
    const clock = new THREE.Clock();
    const ballSphere = new THREE.Sphere();

    function animate() {
        requestAnimationFrame(animate);
        let dt = clock.getDelta();
        if(dt > 0.1) dt = 0.1; 
        let time = Date.now() * 0.002;

        // ANIMACIÓN DE TABLERO DE BASKET (Dificultad añadida)
        if (mode === 'BASKET' && hoop.visible) {
            hoop.position.x = Math.sin(time) * 5; // Oscila de -5 a 5 en X
            hoop.updateMatrixWorld(true);
            boardBox.setFromObject(board);
        }

        if (isMoving) {
            if(mode !== 'RUN') {
                velocity.z *= 0.99; 
                velocity.x *= 0.99;
                
                if(mode === 'SOCCER' && ball.position.y > ballRadius) {
                    velocity.x -= spin * dt * 2;
                }
            }

            velocity.y += gravity * dt;
            ball.position.addScaledVector(velocity, dt);
            
            ball.rotation.x += velocity.z * dt * 0.5;
            ball.rotation.z -= velocity.x * dt * 0.5;
            ball.rotation.y += spin * dt;

            ballSphere.set(ball.position, ballRadius);

            // A) BASKET
            if (mode === 'BASKET') {
                if (boardBox.intersectsSphere(ballSphere)) {
                    let intersectionDepth = ballSphere.radius - Math.abs(boardBox.max.z - ballSphere.center.z);
                    if(intersectionDepth > 0 && velocity.z < 0) {
                        ball.position.z += intersectionDepth + 0.05;
                    }
                    velocity.z *= -0.4; 
                    velocity.y *= 0.8;
                    velocity.x *= 0.8;
                    updateScore(2);
                }
            }

            // B) SOCCER
            if (mode === 'SOCCER') {
                if (goalBox.intersectsSphere(ballSphere)) {
                    if (velocity.z < 0 && ball.position.z < goalBox.max.z) {
                        ball.position.z = goalBox.max.z + ballRadius; 
                        velocity.z *= -0.2; 
                        velocity.x *= 0.5;
                        velocity.y *= 0.5;
                        soccerDistance += 3; // Castigo positivo: Se vuelve más difícil al anotar
                        if (soccerDistance > 50) soccerDistance = 50; // Límite de distancia
                        updateScore(3);
                    }
                }
            }

            // C) SUELO Y BOTE
            if (ball.position.y < ballRadius) {
                ball.position.y = ballRadius; 
                
                if (mode !== 'RUN') {
                    velocity.y *= -0.6; 
                    velocity.z *= 0.8; 
                    velocity.x *= 0.8; 
                    spin *= 0.5; 
                    
                    if (Math.abs(velocity.y) < 1 && Math.abs(velocity.z) < 1) {
                        setTimeout(() => resetTurn(), 800); // Reset automático rápido
                    }
                } else {
                    velocity.y = 0; 
                    spin *= 0.9;
                }
            }

            // D) VALLAS CON COLISIÓN REAL (Racha System)
            if (mode === 'RUN') {
                hurdle.position.z += 20 * dt; 
                
                if (hurdle.position.z > 5) {
                    hurdle.position.z = -40; 
                    updateScore(1);
                }

                if (Math.abs(hurdle.position.z - ball.position.z) < 1.5 && ball.position.y < hurdle.position.y + ballRadius) {
                    // CASTIGO: Pierde la racha
                    score = 0;
                    scoreDisplay.innerText = "¡FALLO!";
                    scoreDisplay.classList.add('streak-lost');
                    hurdle.position.z = -40; 
                }
            }
        }

        renderer.render(scene, camera);
    }
    
    // Escalar canvas si cambian el tamaño de la ventana
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
    setMode('RUN');
</script>
</body>
</html>
